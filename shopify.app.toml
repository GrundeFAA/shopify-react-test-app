# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c7f75bf8b5ddb242d69a8fd10216290e"
name = "react-test"
application_url = "https://shopify-react-test-app-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "customers/create" ]
  uri = "/webhooks/customers/create"

  [[webhooks.subscriptions]]
  topics = [ "customers/update" ]
  uri = "/webhooks/customers/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,write_customers,write_metaobject_definitions,write_metaobjects,write_products"

[auth]
redirect_urls = [ "https://shopify-react-test-app-production.up.railway.app/api/auth", "http://localhost:3000/callback" ]

[app_proxy]
url = "https://shopify-react-test-app-production.up.railway.app/app-proxy"
subpath = "rt-auth"
prefix = "apps"
